name: webswarm-dev

services:
  db:
    image: postgres:18
    container_name: webswarm-db
    env_file: ../worker/.env
    ports:
      - "5432:5432"
    volumes:
      - webswarm_pgdata:/var/lib/postgresql
      - ./jobs_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: webswarm-pgbouncer
    ports:
      - "6432:6432"
    volumes:
      - ../pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ../pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      - db
    restart: unless-stopped

volumes:
  webswarm_pgdata: